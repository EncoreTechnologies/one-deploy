---
- ansible.builtin.import_tasks:
    file: "{{ role_path }}/tasks/common.yml"

- ansible.builtin.include_role:
    name: opennebula/leader
  when: leader is undefined

- when: inventory_hostname == leader
  block:
    - name: Get Datastores
      ansible.builtin.shell:
        cmd: onedatastore list --json
        executable: /bin/bash
      changed_when: false
      register: shell

- name: Parse Datastores
  ansible.builtin.set_fact:
    # ds_name_dict_parsed: This is all the existing datastores before ansible modifies anything
    # ds_dict: The datastores we are trying to add (from our inventory)
    # existing_ds_dict: >-
    #   {{ dict(_ids | zip(_datastores)) }}
    existing_ds_dict: >-
      {{ dict((_ids | map('int') | list) | zip(_datastores)) }}
  vars:
    _document: >-
      {{ shell.stdout | from_json }}
    _datastores: >-
      {{ [_document.DATASTORE_POOL.DATASTORE | d([])] | flatten }}
    _names: >-
      {{ _datastores | map(attribute='NAME') | d([]) | list }}
    _ids: >-
      {{ _datastores | map(attribute='ID') | d([]) | list }}

- when: inventory_hostname == leader
  block:
    - name: Rename datastores
      ansible.builtin.command: "onedatastore rename {{ item.value.ID }} {{ _target_name }}"
      changed_when: true
      when:
        - _matching_user_ds_list | length > 0
        - item.value.NAME != _target_name
      loop: "{{ existing_ds_dict | dict2items }}"
      vars:
        _matching_user_ds_list: >-
          {{ inventory_ds_list | selectattr('value.id', 'equalto', (item.key | int)) | list }}
        _target_name: >-
          {{ _matching_user_ds_list | map(attribute='key') | first | d('') }}

    - name: Loop inventory datastores
      ansible.builtin.include_tasks: ds_helper.yaml
      loop: "{{ inventory_ds_list }}"
      loop_control:
        loop_var: inventory_ds